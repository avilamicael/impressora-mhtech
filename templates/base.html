<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MH Tech — {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --bg:       #f4f6fb;
      --surface:  #ffffff;
      --card:     #ffffff;
      --border:   #e2e6f0;
      --border2:  #cdd3e0;
      --text:     #1a1d2e;
      --muted:    #6b7499;
      --accent:   #3d5fe0;
      --accent2:  #2a48c4;
      --success:  #16a34a;
      --warning:  #d97706;
      --danger:   #dc2626;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      margin: 0;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 240px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      box-shadow: 2px 0 12px rgba(0,0,0,0.06);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 50;
    }
    .sidebar-logo {
      padding: 28px 24px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-logo img { width: 140px; filter: brightness(1.1); }
    .sidebar-label {
      font-family: 'Syne', sans-serif;
      font-size: 9px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-top: 8px;
    }
    .sidebar-nav { padding: 16px 12px; flex: 1; }
    .nav-section-title {
      font-size: 9px;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
      padding: 16px 12px 6px;
      font-family: 'Syne', sans-serif;
      border-top: 1px solid var(--border);
      margin-top: 4px;
    }
    .nav-section-title:first-child { border-top: none; margin-top: 0; padding-top: 8px; }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      font-family: 'Syne', sans-serif;
      font-weight: 500;
      transition: all 0.15s;
      margin-bottom: 2px;
      position: relative;
    }
    .nav-item:hover { background: var(--card); color: var(--text); }
    .nav-item.active {
      background: rgba(61,95,224,0.08);
      color: var(--accent);
      border: 1px solid rgba(61,95,224,0.18);
    }
    .nav-item.active::before {
      content: '';
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      width: 3px; height: 60%;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }
    .nav-icon { width: 16px; height: 16px; opacity: 0.8; }
    .sidebar-footer {
      padding: 16px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--success);
      display: inline-block;
      margin-right: 6px;
      box-shadow: 0 0 6px var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── Main ── */
    .main {
      margin-left: 240px;
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    .topbar {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 32px;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .topbar-title {
      font-family: 'Syne', sans-serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.02em;
    }
    .topbar-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 1px;
    }
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
    }
    .page-content { padding: 32px; flex: 1; }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .card-sub { font-size: 11px; color: var(--muted); margin-bottom: 20px; }

    /* ── Stat cards ── */
    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 1px 8px rgba(0,0,0,0.06);
    }
    .stat-card::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 60px; height: 60px;
      border-radius: 0 12px 0 60px;
      background: rgba(61,95,224,0.05);
    }
    .stat-label {
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 30px;
      font-weight: 800;
      color: var(--text);
      margin-top: 6px;
      line-height: 1;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: 8px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      text-decoration: none;
      letter-spacing: 0.03em;
    }
    .btn-primary {
      background: var(--accent);
      color: #fff;
    }
    .btn-primary:hover { background: var(--accent2); transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border2);
    }
    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }
    .btn-success { background: rgba(34,197,94,0.15); color: var(--success); border: 1px solid rgba(34,197,94,0.25); }
    .btn-success:hover { background: rgba(34,197,94,0.25); }
    .btn-sm { padding: 6px 12px; font-size: 11px; }

    /* ── Table ── */
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .data-table td {
      padding: 13px 16px;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tbody tr { transition: background 0.1s; }
    .data-table tbody tr:hover { background: rgba(61,95,224,0.04); }

    /* ── Badge ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
    }
    .badge-success { background: rgba(34,197,94,0.12); color: var(--success); border: 1px solid rgba(34,197,94,0.2); }
    .badge-warning { background: rgba(245,158,11,0.12); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }
    .badge-danger  { background: rgba(239,68,68,0.12);  color: var(--danger);  border: 1px solid rgba(239,68,68,0.2); }
    .badge-muted   { background: rgba(107,112,148,0.12); color: var(--muted);  border: 1px solid rgba(107,112,148,0.2); }
    .badge-accent  { background: rgba(79,110,247,0.12); color: var(--accent);  border: 1px solid rgba(79,110,247,0.2); }

    /* ── Input / Select ── */
    .field {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 7px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      padding: 8px 12px;
      outline: none;
      transition: border 0.15s;
    }
    .field:focus { border-color: var(--accent); }
    select.field { cursor: pointer; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      padding: 14px 20px;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 600;
      z-index: 9999;
      transform: translateY(80px);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34,1.56,0.64,1);
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { background: #f0fdf4; color: var(--success); border: 1px solid rgba(22,163,74,0.3); box-shadow: 0 4px 20px rgba(22,163,74,0.15); }
    #toast.error   { background: #fff1f1; color: var(--danger);  border: 1px solid rgba(220,38,38,0.3); box-shadow: 0 4px 20px rgba(220,38,38,0.15); }
    #toast.info    { background: #f0f3ff; color: var(--accent);  border: 1px solid rgba(61,95,224,0.3); box-shadow: 0 4px 20px rgba(61,95,224,0.15); }

    /* ── Loading overlay ── */
    #loading {
      position: fixed; inset: 0;
      background: rgba(244,246,251,0.9);
      z-index: 9998;
      display: none;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }
    #loading.show { display: flex; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Misc ── */
    .divider { height: 1px; background: var(--border); margin: 24px 0; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .empty-state-icon { font-size: 40px; margin-bottom: 12px; opacity: 0.4; }
    .empty-state-text { font-family: 'Syne', sans-serif; font-size: 13px; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <img src="/static/img/logo.png" alt="MH Tech"/>
    <div class="sidebar-label">Sistema de Gerenciamento</div>
  </div>
  <nav class="sidebar-nav">

    <!-- Modulo: Impressoras -->
    <div class="nav-section-title">
      <svg width="10" height="10" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="display:inline;margin-right:5px;vertical-align:middle;">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
      </svg>
      Impressoras
    </div>
    <a href="/" class="nav-item {% if request.path == '/' %}active{% endif %}">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2 1 3 3 3h10c2 0 3-1 3-3V7c0-2-1-3-3-3H7C5 4 4 5 4 7z"/>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 11h6M9 15h4"/>
      </svg>
      Snapshots
    </a>
    <a href="/configuracoes" class="nav-item {% if request.path == '/configuracoes' %}active{% endif %}">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
        <circle stroke-linecap="round" stroke-linejoin="round" stroke-width="2" cx="12" cy="12" r="3"/>
      </svg>
      Configuracoes
    </a>
    <a href="/fechamento" class="nav-item {% if request.path == '/fechamento' %}active{% endif %}">
      <svg class="nav-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
      </svg>
      Gerar Fechamento
    </a>

    <!-- Novos modulos podem ser adicionados aqui -->
    <!-- Exemplo:
    <div class="nav-section-title">Financeiro</div>
    <a href="/financeiro" class="nav-item">...</a>
    -->

  </nav>
  <div class="sidebar-footer">
    <span class="status-dot"></span>API Conectada
  </div>
</aside>

<!-- Main -->
<div class="main">
  <header class="topbar">
    <div>
      <div class="topbar-title">{% block topbar_title %}{% endblock %}</div>
      <div class="topbar-sub">{% block topbar_sub %}{% endblock %}</div>
    </div>
    <div class="topbar-right">
      <span id="clock"></span>
    </div>
  </header>
  <div class="page-content">
    {% block content %}{% endblock %}
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div class="loading-text" id="loading-text">Aguarde...</div>
</div>

<script>
  // Clock
  function updateClock() {
    const now = new Date();
    document.getElementById('clock').textContent = now.toLocaleString('pt-BR', {
      day:'2-digit', month:'2-digit', year:'numeric',
      hour:'2-digit', minute:'2-digit'
    });
  }
  updateClock();
  setInterval(updateClock, 1000);

  // Toast
  function showToast(msg, type = 'info', duration = 4000) {
    const icons = { success: '✓', error: '✕', info: 'ℹ' };
    const t = document.getElementById('toast');
    t.className = `show ${type}`;
    t.innerHTML = `<span>${icons[type]}</span><span>${msg}</span>`;
    setTimeout(() => t.className = '', duration);
  }

  // Loading
  function showLoading(text = 'Aguarde...') {
    document.getElementById('loading-text').textContent = text;
    document.getElementById('loading').classList.add('show');
  }
  function hideLoading() {
    document.getElementById('loading').classList.remove('show');
  }
</script>
{% block scripts %}{% endblock %}
</body>
</html>
